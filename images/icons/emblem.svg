<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 190">
  <defs>
    <radialGradient id="glow" cx="42%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fdf1de"/>
      <stop offset="45%" stop-color="#f0be86"/>
      <stop offset="100%" stop-color="#8b6bb0"/>
    </radialGradient>
    <linearGradient id="figureGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#5d4d8a"/>
      <stop offset="100%" stop-color="#8b6bb0"/>
    </linearGradient>
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2749"/>
      <stop offset="100%" stop-color="#2c3968"/>
    </linearGradient>
  </defs>

  <!-- outer navy ring, open at top-right, closed by a dot -->
  <path d="M 169.73 88.90 A 70 70 0 1 1 118.12 27.39"
        fill="none" stroke="#1e2749" stroke-width="12" stroke-linecap="round"/>
  <circle cx="153.6" cy="50" r="12" fill="#1e2749"/>

  <!-- purple accent crescent tracing just outside the ring on the right -->
  <path d="M 161.28 43.58 A 80 80 0 0 1 127.36 170.18"
        fill="none" stroke="#7a63a8" stroke-width="7" stroke-linecap="round"/>

  <!-- warm glow behind inner figure -->
  <circle cx="98" cy="118" r="36" fill="url(#glow)"/>

  <!-- inner figure: head -->
  <circle cx="98" cy="88" r="11" fill="url(#figureGrad)"/>

  <!-- inner figure: heart-shaped body -->
  <path d="M98 106
           C 86 96, 66 102, 64 122
           C 62 140, 80 152, 98 166
           C 116 152, 134 140, 132 122
           C 130 102, 110 96, 98 106 Z"
        fill="url(#figureGrad)"/>

  <!-- cupped hand cradling the figure -->
  <path d="M28 150
           C 55 138, 74 156, 98 156
           C 122 156, 141 138, 168 150
           C 160 168, 134 180, 98 180
           C 62 180, 36 168, 28 150 Z"
        fill="url(#handGrad)"/>
</svg>
